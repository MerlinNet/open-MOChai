name: Merge to Main

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to merge'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - moyi
          - chai-jrpg-dev

concurrency:
  group: merge-main
  cancel-in-progress: true

jobs:
  merge-to-main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Fetch all branches
        run: |
          git fetch origin main
          git fetch origin ${{ github.event.inputs.source_branch }}
      
      - name: Check for conflicts
        id: check
        run: |
          git checkout main
          git merge --no-commit --no-ff origin/${{ github.event.inputs.source_branch }} || {
            echo "conflict=true" >> $GITHUB_OUTPUT
            git merge --abort
            exit 1
          }
          git merge --abort
          echo "conflict=false" >> $GITHUB_OUTPUT
      
      - name: Merge into main
        run: |
          git checkout main
          git pull origin main
          git merge origin/${{ github.event.inputs.source_branch }} --no-ff -m "chore: merge ${{ github.event.inputs.source_branch }} into main [skip ci]"
          git push origin main

  notify-failure:
    needs: merge-to-main
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on conflict
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 合并到 main 失败 - 需要手动解决冲突',
              body: `
                ## 合并冲突
                
                - **源分支**: \`${{ github.event.inputs.source_branch }}\`
                - **目标分支**: \`main\`
                - **触发者**: @${{ github.actor }}
                
                请手动解决冲突后重新触发。
              `,
              labels: ['conflict', 'main-merge']
            })