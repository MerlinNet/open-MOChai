name: Sync to Dev

on:
  push:
    branches: [ moyi, chai-jrpg-dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: sync-dev
  cancel-in-progress: false

jobs:
  sync-to-dev:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          set -euo pipefail
          git fetch origin dev
          git fetch origin moyi
          git fetch origin chai-jrpg-dev

      - name: Determine source branch
        id: source
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=manual" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge source into dev
        id: merge
        run: |
          set -euo pipefail
          git checkout dev
          git pull --ff-only origin dev

          SOURCE="${{ steps.source.outputs.branch }}"
          if [ "$SOURCE" = "manual" ]; then
            echo "手动触发，跳过合并"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git merge origin/$SOURCE --no-ff -m "chore: merge $SOURCE into dev [skip ci]"; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            git push origin dev
          else
            git diff --name-only --diff-filter=U > conflict-files.txt || true
            git merge --abort || true
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload conflict files
        if: failure() && steps.merge.outputs.conflict == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sync-dev-conflict-files
          path: conflict-files.txt
          if-no-files-found: ignore

      - name: Sync dev back to source branches
        if: steps.merge.outputs.conflict != 'true'
        run: |
          set -euo pipefail
          git checkout moyi
          git pull --ff-only origin moyi
          git merge origin/dev -m "chore: sync dev to moyi [skip ci]"
          git push origin moyi

          git checkout chai-jrpg-dev
          git pull --ff-only origin chai-jrpg-dev
          git merge origin/dev -m "chore: sync dev to chai-jrpg-dev [skip ci]"
          git push origin chai-jrpg-dev

      - name: Notify on conflict
        if: failure() && steps.merge.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 合并到 dev 失败 - 需要手动解决冲突',
              body: `
                ## 合并冲突

                - **源分支**: \`${{ steps.source.outputs.branch }}\`
                - **目标分支**: \`dev\`
                - **触发者**: @${{ github.actor }}

                已上传冲突文件列表 artifact：\`sync-dev-conflict-files\`。
                请手动解决冲突后重新触发。
              `,
              labels: ['conflict', 'dev-sync']
            })
