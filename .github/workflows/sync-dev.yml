name: Sync to Dev

on:
  push:
    branches: [ moyi, chai-jrpg-dev ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to sync into dev'
        required: true
        default: 'moyi'
        type: choice
        options:
          - moyi
          - chai-jrpg-dev

concurrency:
  group: sync-dev
  cancel-in-progress: false

jobs:
  sync-to-dev:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all branches
        run: |
          set -euo pipefail
          git fetch origin dev
          git fetch origin moyi
          git fetch origin chai-jrpg-dev

      - name: Determine source branch
        id: source
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.source_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge source into dev
        id: merge
        run: |
          set -euo pipefail
          git checkout dev
          git pull --ff-only origin dev

          SOURCE="${{ steps.source.outputs.branch }}"

          if git merge origin/$SOURCE --no-ff -m "chore: merge $SOURCE into dev [skip ci]"; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            git push origin dev
          else
            git diff --name-only --diff-filter=U > conflict-files.txt || true
            git merge --abort || true
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload conflict files
        if: failure() && steps.merge.outputs.conflict == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sync-dev-conflict-files
          path: conflict-files.txt
          if-no-files-found: ignore

      - name: Sync dev back to source branches
        if: steps.merge.outputs.conflict != 'true'
        id: backsync
        run: |
          set -euo pipefail
          had_conflict=false
          : > backsync-conflicts.txt

          sync_branch() {
            local branch="$1"
            git checkout "$branch"
            git pull --ff-only origin "$branch"

            if git merge origin/dev -m "chore: sync dev to $branch [skip ci]"; then
              git push origin "$branch"
            else
              had_conflict=true
              {
                echo "[$branch]"
                git diff --name-only --diff-filter=U || true
                echo
              } >> backsync-conflicts.txt
              git merge --abort || true
            fi
          }

          sync_branch moyi
          sync_branch chai-jrpg-dev

          if [ "$had_conflict" = true ]; then
            echo "conflict=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Upload backsync conflict files
        if: failure() && steps.backsync.outputs.conflict == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backsync-conflict-files
          path: backsync-conflicts.txt
          if-no-files-found: ignore

      - name: Notify on backsync conflict
        if: failure() && steps.backsync.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ dev 回写分支失败 - 需要手动解决冲突',
              body: `
                ## 回写冲突

                - **源分支**: \`dev\`
                - **目标分支**: \`moyi / chai-jrpg-dev\`
                - **触发者**: @${{ github.actor }}

                已上传冲突文件列表 artifact：\`backsync-conflict-files\`。
                请手动解决冲突后重新触发。
              `,
              labels: ['conflict', 'dev-sync']
            })

      - name: Notify on conflict
        if: failure() && steps.merge.outputs.conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 合并到 dev 失败 - 需要手动解决冲突',
              body: `
                ## 合并冲突

                - **源分支**: \`${{ steps.source.outputs.branch }}\`
                - **目标分支**: \`dev\`
                - **触发者**: @${{ github.actor }}

                已上传冲突文件列表 artifact：\`sync-dev-conflict-files\`。
                请手动解决冲突后重新触发。
              `,
              labels: ['conflict', 'dev-sync']
            })
